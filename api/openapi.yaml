components:
  schemas:
    Status:
      type: string
      enum:
        - success
        - forbidden
        - duplicate-record
        - not-found
        - invalid-request
        - internal-error
    BaseResponse:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/Status'
    ResultResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: boolean
    HealthcheckResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            message:
              type: string
              example: pong
    SessionEmployee:
      type: object
      required:
        - id
        - identityNumber
        - phone
        - salary
        - name
        - email
        - role
        - active
        - creationDate
      properties:
        id:
          type: integer
        identityNumber:
          type: string
          minLength: 1
          maxLength: 32
        phone:
          type: string
          minLength: 1
          maxLength: 24
        salary:
          type: number
          minimum: 0
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 50
        role:
          type: string
          enum:
            - Manager
            - Receptionist
            - Housekeeper
            - Maintenance
        active:
          type: boolean
        creationDate:
          type: string
          format: date-time
    FetchAuthResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SessionEmployee'
    LoginInput:
      type: object
      required:
        - email
        - accessKey
      properties:
        email:
          type: string
          format: email
          maxLength: 50
        accessKey:
          type: string
          minLength: 1
          maxLength: 255
    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SessionEmployee'
    LogoutResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: boolean
    EmployeeCreateInput:
      type: object
      required:
        - identityNumber
        - phone
        - salary
        - name
        - email
        - accessKey
        - role
      properties:
        identityNumber:
          type: string
          minLength: 1
          maxLength: 32
        phone:
          type: string
          minLength: 1
          maxLength: 24
        salary:
          type: number
          minimum: 0
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 50
        accessKey:
          type: string
          minLength: 1
          maxLength: 255
        role:
          type: string
          enum:
            - Manager
            - Receptionist
            - Housekeeper
            - Maintenance
    Employee:
      type: object
      required:
        - id
        - identityNumber
        - phone
        - salary
        - name
        - email
        - role
        - active
        - creationDate
      properties:
        id:
          type: integer
        identityNumber:
          type: string
          minLength: 1
          maxLength: 32
        phone:
          type: string
          minLength: 1
          maxLength: 24
        salary:
          type: number
          minimum: 0
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 50
        role:
          type: string
          enum:
            - Manager
            - Receptionist
            - Housekeeper
            - Maintenance
        active:
          type: boolean
        creationDate:
          type: string
          format: date-time
    EmployeeDataResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Employee'
    EmployeeUpdateInput:
      type: object
      required:
        - employeeId
      properties:
        employeeId:
          type: integer
        identityNumber:
          type: string
          minLength: 1
          maxLength: 32
        phone:
          type: string
          minLength: 1
          maxLength: 24
        salary:
          type: number
          minimum: 0
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 50
        accessKey:
          type: string
          minLength: 1
          maxLength: 255
        role:
          type: string
          enum:
            - Manager
            - Receptionist
            - Housekeeper
            - Maintenance
        active:
          type: boolean
    EmployeeGetInput:
      type: object
      required:
        - employeeIds
      properties:
        employeeIds:
          type: array
          items:
            type: integer
        fields:
          type: array
          items:
            type: string
            enum:
              - id
              - identityNumber
              - phone
              - salary
              - name
              - email
              - role
              - active
              - creationDate
    EmployeeGetResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Employee'
    EmployeeListInput:
      type: object
      required:
        - count
        - page
      properties:
        count:
          type: integer
          minimum: 1
        page:
          type: integer
          minimum: 0
        includeDeleted:
          type: boolean
        search:
          type: object
          required:
            - query
            - searchIn
          properties:
            query:
              type: string
              minLength: 1
              maxLength: 100
            searchIn:
              type: array
              items:
                type: string
                enum:
                  - identityNumber
                  - phone
                  - name
                  - email
                  - role
        filters:
          type: object
          properties:
            role:
              type: string
              enum:
                - Manager
                - Receptionist
                - Housekeeper
                - Maintenance
            active:
              type: boolean
        sort:
          type: object
          properties:
            by:
              type: string
              enum:
                - name
                - role
                - creationDate
            order:
              type: string
              enum:
                - asc
                - desc
        fields:
          type: array
          items:
            type: string
            enum:
              - id
              - identityNumber
              - phone
              - salary
              - name
              - email
              - role
              - active
              - creationDate
    EmployeeListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Employee'
            total:
              type: integer
            page:
              type: integer
    ClientCreateInput:
      type: object
      required:
        - name
        - identityNumber
        - phone
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        identityNumber:
          type: string
          minLength: 1
          maxLength: 32
        phone:
          type: string
          minLength: 1
          maxLength: 24
    Client:
      type: object
      required:
        - id
        - name
        - identityNumber
        - phone
        - active
        - creationDate
      properties:
        id:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 100
        identityNumber:
          type: string
          minLength: 1
          maxLength: 32
        phone:
          type: string
          minLength: 1
          maxLength: 24
        active:
          type: boolean
        creationDate:
          type: string
          format: date-time
    ClientDataResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Client'
    ClientUpdateInput:
      type: object
      required:
        - clientId
      properties:
        clientId:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 100
        identityNumber:
          type: string
          minLength: 1
          maxLength: 32
        phone:
          type: string
          minLength: 1
          maxLength: 24
        active:
          type: boolean
    ClientGetInput:
      type: object
      required:
        - clientIds
      properties:
        clientIds:
          type: array
          items:
            type: integer
        fields:
          type: array
          items:
            type: string
            enum:
              - id
              - name
              - identityNumber
              - phone
              - active
              - creationDate
    ClientGetResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Client'
    ClientListInput:
      type: object
      required:
        - count
        - page
      properties:
        count:
          type: integer
          minimum: 1
        page:
          type: integer
          minimum: 0
        includeDeleted:
          type: boolean
        search:
          type: object
          required:
            - query
            - searchIn
          properties:
            query:
              type: string
              minLength: 1
              maxLength: 100
            searchIn:
              type: array
              items:
                type: string
                enum:
                  - name
                  - identityNumber
                  - phone
        sort:
          type: object
          properties:
            by:
              type: string
              enum:
                - name
                - creationDate
            order:
              type: string
              enum:
                - asc
                - desc
        fields:
          type: array
          items:
            type: string
            enum:
              - id
              - name
              - identityNumber
              - phone
              - active
              - creationDate
    ClientListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Client'
            total:
              type: integer
            page:
              type: integer
    RoomTypeCreateInput:
      type: object
      required:
        - description
        - maxOccupancy
        - price
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 50
        maxOccupancy:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 0
    RoomType:
      type: object
      required:
        - id
        - description
        - maxOccupancy
        - price
        - active
        - creationDate
      properties:
        id:
          type: integer
        description:
          type: string
          minLength: 1
          maxLength: 50
        maxOccupancy:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 0
        active:
          type: boolean
        creationDate:
          type: string
          format: date-time
    RoomTypeDataResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RoomType'
    RoomTypeUpdateInput:
      type: object
      required:
        - roomTypeId
      properties:
        roomTypeId:
          type: integer
        description:
          type: string
          minLength: 1
          maxLength: 50
        maxOccupancy:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 0
        active:
          type: boolean
    RoomTypeGetInput:
      type: object
      required:
        - roomTypeIds
      properties:
        roomTypeIds:
          type: array
          items:
            type: integer
        fields:
          type: array
          items:
            type: string
            enum:
              - id
              - description
              - maxOccupancy
              - price
              - active
              - creationDate
    RoomTypeGetResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/RoomType'
    RoomTypeListInput:
      type: object
      required:
        - count
        - page
      properties:
        count:
          type: integer
          minimum: 1
        page:
          type: integer
          minimum: 0
        includeDeleted:
          type: boolean
        search:
          type: object
          required:
            - query
            - searchIn
          properties:
            query:
              type: string
              minLength: 1
              maxLength: 100
            searchIn:
              type: array
              items:
                type: string
                enum:
                  - description
        sort:
          type: object
          properties:
            by:
              type: string
              enum:
                - description
                - maxOccupancy
                - price
                - creationDate
            order:
              type: string
              enum:
                - asc
                - desc
        fields:
          type: array
          items:
            type: string
            enum:
              - id
              - description
              - maxOccupancy
              - price
              - active
              - creationDate
    RoomTypeListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/RoomType'
            total:
              type: integer
            page:
              type: integer
    RoomCreateInput:
      type: object
      required:
        - number
        - roomTypeId
        - description
        - state
      properties:
        number:
          type: string
          minLength: 1
          maxLength: 20
        roomTypeId:
          type: integer
        description:
          type: string
          minLength: 1
          maxLength: 500
        state:
          type: string
          enum:
            - Avaliable
            - Occupied
            - Maintenance
    Room:
      type: object
      required:
        - id
        - number
        - roomTypeId
        - description
        - state
        - active
        - creationDate
      properties:
        id:
          type: integer
        number:
          type: string
