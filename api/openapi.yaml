openapi: 3.0.0
info:
  title: Golden Lotus Hotel API
  version: 1.0.0
paths:
  /api/healthcheck/ping:
    get:
      operationId: pingHealthcheck
      responses:
        '200':
          description: Healthcheck response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthcheckResponse'
  /api/auth/fetch:
    get:
      operationId: fetchAuthSession
      responses:
        '200':
          description: Fetch current authenticated employee session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FetchAuthResponse'
  /api/auth/login:
    post:
      operationId: loginAuth
      requestBody:
        $ref: '#/components/requestBodies/LoginRequest'
      responses:
        '200':
          description: Login response
          headers:
            Set-Cookie:
              description: HttpOnly JWT cookie containing the session token.
              schema:
                type: string
                example: session=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...; Path=/; HttpOnly; Secure; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /api/auth/logout:
    post:
      operationId: logoutAuth
      responses:
        '200':
          description: Logout response and clear auth cookie
          headers:
            Set-Cookie:
              description: Clears the session cookie on logout.
              schema:
                type: string
                example: session=; Path=/; HttpOnly; Secure; SameSite=Lax; Max-Age=0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
  /api/employees/create:
    post:
      operationId: createEmployee
      requestBody:
        $ref: '#/components/requestBodies/EmployeeCreateRequest'
      responses:
        '200':
          description: Create employee response
