<div class="flex items-center gap-4 pt-4 pb-4 w-full">
  <div class="relative flex-grow max-w-10xl">
    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
      <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        ></path>
      </svg>
    </span>
    <input
      type="text"
      class="w-full py-2.5 pl-10 pr-4 text-sm text-gray-700 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
      [placeholder]="placeholder"
      (keyup)="handleKeyDown($event)"
    />
  </div>
  <div class="flex items-center justify-between">

      <button
        type="button"
        class="flex items-center justify-center px-5 py-2 gap-3 bg-blue-600 text-white shadow-md rounded-lg hover:bg-blue-500 hover:text-white"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5" fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 4v16m8-8H4"
          />
        </svg>
        {{ textButton }}
      </button>
    </div>
</div>
