<div class="mb-4">
  <div class="flex items-center gap-4 text-slate-800">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-12 w-12"
      fill="currentColor"
      viewBox="0 0 24 24"
    >
      <path [attr.d]="iconPath" />
    </svg>
    <h2 class="text-3xl font-bold tracking-tight">{{ title }}</h2>
  </div>

  <p class="text-base text-slate-500 mt-2 ml-16" [innerHTML]="description"></p>
</div>

<div class="flex items-center gap-4 pt-4 pb-4 w-full">
  <div class="relative flex-grow max-w-10xl">
    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
      <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        ></path>
      </svg>
    </span>
    <input
      type="text"
      class="w-full py-2.5 pl-10 pr-4 text-sm text-gray-700 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
      [placeholder]="searchPlaceholder"
    />
  </div>

  <button
    (click)="onAdd.emit()"
    class="flex items-center gap-2 px-5 py-2.5 text-sm text-white bg-blue-600 rounded-lg font-semibold shrink-0 transition-all duration-300 shadow-sm hover:bg-blue-500 active:scale-95 cursor-pointer"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
    </svg>
    {{ buttonLabel }}
  </button>
</div>

<ng-content></ng-content>

<div class="w-full flex items-center justify-between gap-5 overflow-hidden mb-6">
  <div class="flex items-center justify-center mt-8 gap-2">
    <button
      class="flex justify-center items-center w-8 h-8 rounded-xl border-2 border-gray-100 text-gray-400 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-all active:scale-90"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <div class="flex gap-2">
      <button
        class="flex justify-center items-center w-8 h-8 rounded-xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-200 transition-transform active:scale-95"
      >
        1
      </button>
      <button
        class="flex justify-center items-center w-8 h-8 rounded-xl border-2 border-gray-100 text-gray-600 font-bold hover:bg-gray-50 transition-all active:scale-95"
      >
        2
      </button>
      <button
        class="flex justify-center items-center w-8 h-8 rounded-xl border-2 border-gray-100 text-gray-600 font-bold hover:bg-gray-50 transition-all active:scale-95"
      >
        3
      </button>
    </div>
    <button
      class="flex justify-center items-center w-8 h-8 rounded-xl border-2 border-gray-100 text-gray-400 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-all active:scale-90"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  </div>

  <div class="flex items-center justify-center mt-8 gap-2">
    <label class="text-sm font-bold text-gray-700 ml-1"
      >Mostrando 1-10 de {{ totalRecords }} registros</label
    >
    <div class="relative">
      <select
        class="block w-full px-10 py-1 bg-white border-2 border-gray-200 text-gray-700 rounded-2xl appearance-none cursor-pointer focus:outline-none focus:border-blue-500 transition-all"
      >
        <option selected>1/10</option>
        <option>1/20</option>
        <option>1/50</option>
        <option>1/100</option>
      </select>
      <div
        class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-400"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </div>
    </div>
  </div>
</div>

<div class="flex items-center gap-5 mt-auto pt-4 border-t border-slate-700">
  <label class="relative inline-flex items-center cursor-pointer group">
    <input type="checkbox" class="sr-only peer" />
    <div
      class="w-14 h-7 bg-gray-300 rounded-full peer peer-focus:ring-4 peer-focus:ring-blue-200 peer-checked:bg-blue-600 transition-all duration-300 group-hover:bg-gray-400"
    ></div>
    <div
      class="absolute left-1 top-1 w-5 h-5 bg-white rounded-full shadow-md peer-checked:translate-x-7 transition-transform duration-300"
    ></div>
  </label>
  <span class="text-sm font-semibold text-gray-700">Mostrar registros inactivos</span>
</div>
