<div
  class="mt-8 flex flex-col gap-4 rounded-2xl bg-white px-4 py-3 sm:flex-row sm:items-center sm:justify-between"
>
  <div class="text-sm font-semibold text-gray-700">
    @if (totalRecords > 0) {
      Mostrando {{ startRecord }}-{{ endRecord }} de {{ totalRecords }} registros
    } @else {
      No hay registros para mostrar
    }
  </div>

  <div class="flex flex-wrap items-center gap-3">
    <div class="flex items-center gap-2">
      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-xl border text-gray-500 transition hover:border-blue-500 hover:text-blue-600 disabled:cursor-not-allowed disabled:opacity-40"
        [disabled]="currentPage === 0"
        (click)="goToPage(currentPage - 1)"
        aria-label="Página anterior"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          />
        </svg>
      </button>

      <div class="flex items-center gap-1">
        @for (pageItem of pageNumbers; track $index) {
          @if (pageItem === 'ellipsis') {
            <span class="px-2 text-sm font-semibold text-gray-400">...</span>
          } @else {
            <button
              type="button"
              class="inline-flex h-10 min-w-10 items-center justify-center rounded-xl border px-3 text-sm font-semibold transition"
              [class.border-blue-500]="pageItem === currentPage"
              [class.bg-blue-500]="pageItem === currentPage"
              [class.text-white]="pageItem === currentPage"
              [class.border-gray-200]="pageItem !== currentPage"
              [class.bg-white]="pageItem !== currentPage"
              [class.text-gray-700]="pageItem !== currentPage"
              (click)="goToPage(pageItem)"
            >
              {{ pageItem + 1 }}
            </button>
          }
        }
      </div>

      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-gray-200 text-gray-500 transition hover:border-blue-500 hover:text-blue-600 disabled:cursor-not-allowed disabled:opacity-40"
        [disabled]="currentPage >= totalPages - 1"
        (click)="goToPage(currentPage + 1)"
        aria-label="Página siguiente"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </button>
    </div>

    <div class="relative">
      <select
        class="appearance-none rounded-xl border border-gray-200 bg-white px-4 py-2 pr-10 text-sm font-semibold text-gray-700 shadow-sm transition focus:border-blue-500 focus:outline-none"
        [value]="pageSize"
        (change)="onPageSizeChange($event)"
        aria-label="Tamaño de página"
      >
        @for (size of pageSizeOptions; track size) {
          <option [value]="size">{{ size }} / página</option>
        }
      </select>

      <div
        class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </div>
    </div>
  </div>
</div>
