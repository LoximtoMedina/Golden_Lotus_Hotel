             alt="avatar">
        <h4 class="mx-2 mt-2 font-medium text-gray-200">{{ userName }}</h4>
        <p class="mx-2 mt-1 text-sm font-medium text-gray-400">{{ userRole }}</p>
    </div>

    <div class="flex flex-col justify-between flex-1 mt-10">

            </p>

            <a routerLink="/clients" routerLinkActive="bg-blue-600 text-white"

                <span class="mx-2 font-medium">Clientes</span>
            </a>

            <a routerLink="/employees" routerLinkActive="bg-blue-600 text-white" 
               class="flex items-center px-4 py-2 text-gray-400 transition-colors duration-300 transform rounded-lg hover:bg-slate-800 hover:text-gray-200">

            <a routerLink="/reservations" routerLinkActive="bg-blue-600 text-white"

            </a>

            <a routerLink="/rooms" routerLinkActive="bg-blue-600 text-white"

                <span class="mx-2 font-medium">Habitaciones</span>

            <a routerLink="/rooms-types" routerLinkActive="bg-blue-600 text-white"
