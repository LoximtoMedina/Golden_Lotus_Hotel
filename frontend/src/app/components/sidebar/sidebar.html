<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <aside
      class="flex flex-col w-72 h-[calc(100vh-4rem)] m-4 px-6 py-8 bg-white border border-gray-200 rounded-3xl transition-all duration-300"
    >
      <div class="flex items-center justify-between w-full mb-6 gap-2">
        <div class="flex items-center gap-3 min-w-0">
          <div class="relative flex-shrink-0">
            <img
              class="object-cover w-10 h-10 rounded-full border-2 border-slate-700 p-0.5"
              src="https://media.discordapp.net/attachments/951154422761807923/1214773640009351189/image.png?ex=69de5a5d&is=69dd08dd&hm=e10821be33f13915fea17588c08f5f8f53f290eb698e3353c657acf4f61d969f&=&format=webp&quality=lossless&width=214&height=180"
              alt="avatar"
            />
          </div>
          <div class="flex flex-col min-w-0">
            <h4 class="text-sm font-bold text-gray-900 leading-tight truncate">{{ name }}</h4>
            <p class="text-xs text-gray-400 truncate">{{ role }}</p>
          </div>
        </div>
      </div>

      <hr class="border-t-2 border-gray-400 mb-8 mx-2" />

      <div class="flex flex-col flex-1">
        <h3 class="px-4 mb-4 text-lg font-bold text-black">Gestión</h3>

        <nav class="flex flex-col gap-2">
          <a
            routerLink="/employees"
            routerLinkActive="bg-blue-600 text-white shadow-md hover:bg-blue-500 hover:text-white hover:scale-101"
            class="flex items-center px-15 w-full py-3 text-gray-400 font-semibold rounded-xl transition-all duration-200 hover:bg-blue-50 hover:text-blue-600"
          >
            Empleados
          </a>

          <a
            routerLink="/clients"
            routerLinkActive="bg-blue-600 text-white shadow-md hover:bg-blue-500 hover:text-white hover:scale-101"
            class="flex items-center w-full px-15 py-2 text-gray-400 font-semibold rounded-xl transition-all duration-200 hover:bg-blue-50 hover:text-blue-600"
          >
            Clientes
          </a>

          <a
            routerLink="/reservations"
            routerLinkActive="bg-blue-600 text-white shadow-md hover:bg-blue-500 hover:text-white hover:scale-101"
            class="flex items-center px-15 w-full py-3 text-gray-400 font-semibold rounded-xl transition-all duration-200 hover:bg-blue-50 hover:text-blue-600"
          >
            Reservaciones
          </a>

          <a
            routerLink="/rooms"
            routerLinkActive="bg-blue-600 text-white shadow-md hover:bg-blue-500 hover:text-white hover:scale-101"
            class="flex items-center px-15 w-full py-3 text-gray-400 font-semibold rounded-xl transition-all duration-200 hover:bg-blue-50 hover:text-blue-600"
          >
            Habitaciones
          </a>

          <a
            routerLink="/rooms-types"
            routerLinkActive="bg-blue-600 text-white shadow-md hover:bg-blue-500 hover:text-white hover:scale-101"
            class="flex items-center px-15 w-full py-3 text-gray-400 font-semibold rounded-xl transition-all duration-200 hover:bg-blue-50 hover:text-blue-600"
          >
            Tipos de Habitación
          </a>
        </nav>
      </div>

      <div class="mt-auto pt-6 border-t border-slate-700">
        <button
          class="flex items-center w-full px-4 py-3 text-red-400 transition-colors duration-300 transform rounded-lg hover:bg-red-500 hover:text-white"
        >
          <span class="mx-2 font-medium">Cerrar Sesión</span>
        </button>
      </div>
    </aside>
  </body>
</html>
