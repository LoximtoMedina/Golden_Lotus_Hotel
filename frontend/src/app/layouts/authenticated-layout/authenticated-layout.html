<div class="h-[100vh] flex items-center flex-col justify-space-between bg-gray-100">
  <div class="flex items-center justify-center flex-1 w-full">
    <app-sidebar [name]="name()" [role]="role()"></app-sidebar>

    @if (!isCheckingAuth()) {
      <main class="flex-1 h-[calc(100vh-4rem)] overflow-y-scroll w-full p-6 bg-white mr-4 rounded-3xl">
        <router-outlet></router-outlet>
      </main>
    } @else {
      <div class="flex-1 h-[calc(100vh-4rem)] w-full p-6 mr-4 rounded-3xl"></div>
    }
  </div>
</div>
