<app-authenticated-layout>
  <div class="mb-4">
    <div class="flex items-center gap-4 text-slate-800">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-12 w-12"
        fill="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
        />
      </svg>
      <h2 class="text-3xl font-bold tracking-tight">Gestión de Reservas</h2>
    </div>
    <p class="text-base text-slate-500 ml-16">Gestiona las reservas de <i>Golden Lotus Hotel</i></p>
  </div>

  <app-search-bar
    [placeholder]="'Buscar por status...'"
    [textButton]="'Nueva Reservación'"
    (onSearch)="handleSearch($event)"
    (onButtonClick)="openAddModal()"
  ></app-search-bar>

  <app-reservations-table [records]="reservations()" />

  <div class="mt-6 flex flex-wrap items-center justify-between gap-4 border-t border-slate-700">
    <app-switch
      [label]="'Mostrar Registros Eliminados'"
      (checkedChange)="handleShowDeletedChange($event)"
    ></app-switch>

    <app-pagination
      [currentPage]="page()"
      [totalRecords]="total()"
      [pageSize]="count()"
      [pageSizeOptions]="pageSizeOptions"
      (change)="handlePaginationChange($event)"
    ></app-pagination>
  </div>
</app-authenticated-layout>

<!-- Adding/Editing Modal-->
<div
  *ngIf="showFormModal"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4"
>
  <div
    class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200"
  >
    <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center">
      <h2 class="text-xl font-bold text-gray-800">
        {{ isEditing ? 'Actualizar Registro' : 'Nuevo Registro' }}
      </h2>
      <button (click)="closeModals()" class="text-gray-400 hover:text-gray-600 transition-colors">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <form class="p-8 space-y-5">
      <div *ngIf="isEditing" class="flex flex-col gap-1">
        <label class="text-xs font-bold text-gray-400 uppercase ml-1">ID</label>
        <input
          type="text"
          [value]="currentData.id"
          disabled
          class="bg-gray-50 p-3 rounded-xl border border-gray-200 text-gray-400 cursor-not-allowed"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-bold text-gray-700 uppercase ml-1">DNI</label>
        <input
          type="text"
          [(ngModel)]="currentData.dni"
          name="name"
          placeholder="Ej. 0301-2006-02367"
          class="w-full p-3 rounded-xl border-2 border-gray-100 focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 outline-none transition-all"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-bold text-gray-700 uppercase ml-1">Full Name</label>
        <input
          type="text"
          [(ngModel)]="currentData.name"
          name="name"
          placeholder="Ej. Cristian Josué Medina Galeano"
          class="w-full p-3 rounded-xl border-2 border-gray-100 focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 outline-none transition-all"
        />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-xs font-bold text-gray-700 uppercase ml-1">Phone</label>
        <input
          type="text"
          [(ngModel)]="currentData.phone"
          name="phone"
          placeholder="Ej. 9844-2416"
          class="w-full p-3 rounded-xl border-2 border-gray-100 focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 outline-none transition-all"
        />
      </div>

      <div *ngIf="isEditing" class="flex flex-col gap-1">
        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Active</label>
        <input
          type="text"
          [value]="currentData.active"
          disabled
          class="bg-gray-50 p-3 rounded-xl border border-gray-200 text-gray-400 cursor-not-allowed"
        />
      </div>

      <div *ngIf="isEditing" class="flex flex-col gap-1">
        <label class="text-xs font-bold text-gray-400 uppercase ml-1">CreationDate</label>
        <input
          type="text"
          [value]="currentData.creationDate"
          disabled
          class="bg-gray-50 p-3 rounded-xl border border-gray-200 text-gray-400 cursor-not-allowed"
        />
      </div>

      <div class="flex gap-3 pt-4">
        <button
          type="button"
          (click)="closeModals()"
          class="flex-1 py-3 px-4 rounded-xl font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-all"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="flex-1 py-3 px-4 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95"
        >
          {{ isEditing ? 'Guardar Cambios' : 'Registrar' }}
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Modal -->
<div
  *ngIf="showDeleteModal"
  class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4"
>
  <div
    class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center animate-in zoom-in duration-200"
  >
    <div
      class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-10 w-10"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
        />
      </svg>
    </div>

    <h2 class="text-2xl font-bold text-gray-800 mb-2">¿Estás seguro?</h2>
    <p class="text-gray-500 mb-8 leading-relaxed">
      Estás a punto de eliminar a
      <span class="font-bold text-gray-900">{{ currentData.name }}</span
      >. Esta acción no se puede deshacer.
    </p>

    <div class="flex gap-3">
      <button
        (click)="closeModals()"
        type="button"
        class="flex-1 py-3 bg-gray-100 text-gray-500 font-bold rounded-xl hover:bg-gray-200 transition-colors"
      >
        Cancelar
      </button>

      <button
        (click)="deleteEntity()"
        type="button"
        class="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 shadow-lg shadow-red-200 transition-all active:scale-95"
      >
        Sí, eliminar
      </button>
    </div>
  </div>
</div>
