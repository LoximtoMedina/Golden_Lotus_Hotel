    <div>

        <div class="flex items-center gap-4 text-slate-800">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
            </svg>

            <h2 class="text-3xl font-bold tracking-tight">
                Gestión de Empleados
            </h2>
        </div>

        <p class="text-base text-slate-500 mt-2 ml-16">
            Gestiona los Empleados del Hotel
        </p>

    </div>

    <div class="flex items-center gap-4 p-4 w-full">

        <div class="relative flex-grow max-w-2xl">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </span>
            <input type="text"
                class="w-full py-2.5 pl-10 pr-4 text-sm text-gray-700 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                placeholder="Buscar por (description)...">
        </div>

        <button class="flex items-center gap-2 px-5 py-2.5 text-sm text-white bg-blue-600 rounded-lg font-semibold shrink-0 transition-all duration-300 shadow-sm
               hover:bg-blue-500 active:scale-95 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Crear nuevo Empleado
        </button>

    </div>

    <div class="bg-white rounded-xl border border-slate-300 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-300 text-sm">
                <thead class="bg-gray-50/50 text-left">
                    <tr>
                        <th class="px-6 py-4 font-semibold text-gray-600 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-4 font-semibold text-gray-600 uppercase tracking-wider">DNI</th>
                        <th class="px-6 py-4 font-semibold text-gray-600 uppercase tracking-wider">Name</th>
                        <th class="px-6 py-4 font-semibold text-gray-600 uppercase tracking-wider">Phone</th>
                        <th class="px-6 py-4 font-semibold text-gray-600 uppercase tracking-wider">Email</th>
                        <th class="px-6 py-4 font-semibold text-gray-600 uppercase tracking-wider">Salary</th>
                        <th class="px-6 py-4 font-semibold text-gray-600 uppercase tracking-wider">ACTIONS</th>
                    </tr>
                </thead>

                <tbody class="divide-y divide-slate-300">

                    @for (employee of employees(); track employee.id){
                        <tr class="hover:bg-blue-50/30 transition-colors">
                            <td class="whitespace-nowrap px-6 py-4 text-gray-800 font-medium">{{ employee.id }}</td>
                            <td class="whitespace-nowrap px-6 py-4 text-gray-700">{{employee.identityNumber}}</td>
                            <td class="whitespace-nowrap px-6 py-4 text-gray-900">{{employee.name}}</td>
                            <td class="whitespace-nowrap px-6 py-4 text-gray-700">{{employee.phone}}</td>
                            <td class="whitespace-nowrap px-6 py-4 text-gray-600 font-mono text-xs">{{employee.email}}</td>
                            <td class="whitespace-nowrap px-6 py-4 text-green-700 font-mono font-bold">L. {{employee.salary}}</td>


                            <td class="flex items-center justify-center space-x-2 px-6 py-4">
                                <button
                                    class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 text-slate-500 transition-all duration-300 hover:bg-green-50 hover:scale-105 active:scale-95 group"
                                    title="Editar Registro">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                    </svg>
                                </button>

                                <button
                                    class="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 text-slate-500 transition-all duration-300 hover:bg-green-50 hover:scale-105 active:scale-95 group"
                                    title="Borrar Registro">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="red"
                                        viewBox="0 0 16 16">
                                        <path
                                            d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z" />
                                        <path fill-rule="evenodd"
                                            d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z" />
                                    </svg>
                                </button>
                            </td>

                        </tr>
                    }

                </tbody>
            </table>
        </div>
    </div>
